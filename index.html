<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contagem Especial</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    #contador {
      font-size: 2.5rem;
      color: #00ffcc;
    }

    /* Tela surpresa */
    .surpresa {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    .surpresa img {
      width: 90%;
      max-width: 320px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,255,204,0.6);
    }

    .titulo {
      font-size: 1.8rem;
      font-weight: bold;
      color: #ff4d6d;
    }

    .mensagem {
      font-size: 1.3rem;
    }

    @media (min-width: 768px) {
      #contador {
        font-size: 3.5rem;
      }

      .titulo {
        font-size: 2.5rem;
      }

      .mensagem {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- CONTADOR -->
  <div class="container" id="telaContador">
    <h1>Faltam:</h1>
    <div id="contador"></div>
  </div>

  <!-- SURPRESA -->
  <div class="surpresa" id="telaSurpresa">
    <div class="titulo">Dia da nossa transa 😈</div>

    <img src="foto.jpg" alt="Nós dois">

    <div class="mensagem">
      Finalmente chegou o nosso dia ❤️
    </div>

    <!-- Música -->
    <audio id="musica" src="musica.mp3"></audio>
  </div>

  <script>
    // DATA (5 de julho de 2026)
    const dataFinal = new Date(2026, 6, 5);

    function atualizar() {
      const hoje = new Date();
      const diferenca = dataFinal - hoje;

      const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));

      if (dias > 0) {
        document.getElementById("contador").innerText = dias + " dias";
      } else {
        // MOSTRAR SURPRESA
        document.getElementById("telaContador").style.display = "none";
        document.getElementById("telaSurpresa").style.display = "flex";

        // TOCAR MÚSICA
        const musica = document.getElementById("musica");
        musica.play();
      }
    }

    atualizar();
    setInterval(atualizar, 1000);
  </script>

</body>
</html>
